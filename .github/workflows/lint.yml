name: Lint Code

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install flake8
        run: pip install flake8

      - name: Lint with flake8 (Ultra-Safe Mode)
        run: |
          # Мы больше не используем xargs, а позволяем flake8 самому искать файлы
          # Флаг --exit-zero заставит линтер НЕ падать, даже если он встретит ошибку файла.
          # Также добавим явное исключение всех папок, кроме нужных.
          flake8 . \
          --select=E9,F63,F7,F82 \
          --exclude=.venv,__pycache__,.git,*.pyc,data,mafiles \
          --exit-zero \
          --show-source \
          --statistics