name: Lint Code

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Clean up project (Force remove junk)
        run: |
          # Удаляем всё, что содержит null bytes или не должно быть в линтере
          rm -rf .venv/
          rm -rf .git/
          rm -rf __pycache__/
          rm -rf data/
          find . -name "*.pyc" -delete
          find . -name "*.db" -delete

      - name: Install flake8
        run: pip install flake8

      - name: Lint with flake8
        run: |
          # Теперь линтер гарантированно не найдет бинарных файлов
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics