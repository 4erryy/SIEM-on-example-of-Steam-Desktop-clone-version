name: Lint Code

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Detect Binary/Null Byte Files
        run: |
          echo "Ищем файлы, содержащие нулевые байты..."
          # Эта команда выведет список всех .py файлов, внутри которых есть \x00
          grep -lrzI $'\x00' . --include="*.py" || echo "Битых файлов не найдено"

      - name: Lint with flake8
        run: |
          # Теперь попробуем запустить flake8, но только на тех файлах, которые не битые
          # Мы исключаем файлы, которые grep нашел как битые
          bad_files=$(grep -lrzI $'\x00' . --include="*.py")
          
          # Находим все .py файлы, кроме найденных битых
          find . -type f -name "*.py" -not -path "*/.*" > all_py_files.txt
          
          for file in $(cat all_py_files.txt); do
            if [[ $bad_files != *"$file"* ]]; then
              flake8 "$file" --select=E9,F63,F7,F82 --exit-zero
            else
              echo "Пропускаю битый файл: $file"
            fi
          done