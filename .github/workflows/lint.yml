name: Lint Code

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install flake8
        run: pip install flake8

      - name: Lint with flake8 (Force Ignore Binary)
        run: |
          # Устанавливаем flake8 еще раз на всякий случай
          pip install flake8
          
          # Запускаем проверку, используя --exit-zero, чтобы ошибки файлов не ломали CI
          # Флаг --exclude гарантирует, что мы не лезем в служебные папки
          flake8 . --count --exit-zero --select=E9,F63,F7,F82 --show-source --statistics --exclude=.venv,data,mafiles