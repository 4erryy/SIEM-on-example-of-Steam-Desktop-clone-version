name: Lint Code

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint with flake8 (Safety Mode)
        run: |
          # 1. Проверяем только критические ошибки (синтаксис, импорты). 
          # Если они есть — сборка упадет.
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          
          # 2. Проверяем остальное (стиль: пробелы, длина строк). 
          # Сборка НЕ упадет даже если есть замечания (--exit-zero).
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics