name: Lint Code

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install flake8
        run: pip install flake8

      - name: Lint with flake8 (Atomic Mode)
        run: |
          # 1. Находим только файлы .py, игнорируя скрытые папки и окружение
          # 2. Передаем их в flake8 по одному через xargs, чтобы ошибка в одном не ломала весь процесс
          # 3. Добавляем --exit-zero, чтобы даже при ошибке парсинга битого файла пайплайн не падал
          find . -type f -name "*.py" -not -path "*/.*" -not -path "./.venv/*" | xargs -I {} flake8 {} --select=E9,F63,F7,F82 --exit-zero --statistics