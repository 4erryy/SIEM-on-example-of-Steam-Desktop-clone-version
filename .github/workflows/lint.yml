name: Lint Code

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install flake8
        run: pip install flake8

      - name: Lint with flake8 (Strict Security Mode)
        run: |
          # Используем поиск файлов, чтобы передать в flake8 ТОЛЬКО файлы с расширением .py
          # Это гарантирует, что бинарные файлы (db, .exe, .so, .pyc) не попадут в проверку
          find . -type f -name "*.py" -not -path "*/.*" -not -path "./.venv/*" | xargs flake8 --count \
          --select=E9,F63,F7,F82 \
          --exclude=.venv,__pycache__,.git,*.pyc \
          --show-source \
          --statistics