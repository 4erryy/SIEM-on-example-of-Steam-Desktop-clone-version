name: Lint Code

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install flake8
        run: pip install flake8

      - name: Hide corrupted files
        run: |
          # Находим все файлы с нулевыми байтами и меняем их расширение
          grep -lrzI $'\x00' . --include="*.py" | xargs -I {} mv {} {}.bad_py
          echo "Файлы с ошибками скрыты от линтера."

      - name: Lint with flake8
        run: |
          # Теперь flake8 увидит только здоровые файлы
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics